# v3 two-GPU + NATIVE-VIDEO caption on vLLM (gemma4_dense via vLLM video modality).
# Same model + same 32-frame native-video input as pipeline_v3_dense_video_2gpu.yaml,
# but s8 runs on vLLM instead of HuggingFace .generate() -> ~10-30x faster.
#
# Run:
#   CUDA_VISIBLE_DEVICES=4,5 bash scripts/run_v3_dense_video_2gpu.sh /path/to/movie.mp4 [VIDEO_ID]  CONFIG=pipeline_v3_dense_vllm_2gpu.yaml
#   (or call run_pipeline.py directly with --config pipeline_v3_dense_vllm_2gpu.yaml)

pipeline_root: /mnt/data0/harsha/new_dataset_pipeline/Indic_video_pipeline
outputs_root: /mnt/data0/harsha/new_dataset_pipeline/v3_outputs_dense
models_root: /mnt/data0/harsha/new_dataset_pipeline/models

output_layout: per_movie
isolate_run_outputs: true

workspaces_dir: workspaces
logs_dir: logs
reports_dir: reports

prompt_pack:
  zip_path: /mnt/data0/harsha/new_dataset_pipeline/zip_12buckets.zip

export:
  include_verdicts:
    - FINAL
    - REVIEW
  export_clips: true
  remove_watermark: false

s2:
  mode: score_only

s1:
  parallel_scene_chunks: 8
  scene_chunk_overlap_sec: 15

s4:
  backend: vllm
  caption_model: gemma4
  model_path: /mnt/data0/harsha/new_dataset_pipeline/models/gemma-4-31b-it
  tensor_parallel_size: 1
  gpu_ids: [0]
  batch_size: 8
  max_tokens: 128
  drop_text_clips: true   # clips with on-screen text are rejected; s5-s12 skip them

s5:
  backend: vllm
  classify_model_path: /mnt/data0/harsha/new_dataset_pipeline/models/Qwen2.5-VL-7B-Instruct
  vote_frames: 1
  max_tokens: 128
  tensor_parallel_size: 1
  gpu_ids: [0]
  batch_size: 12
  parallel: false

s6:
  mode: vlm

ray:
  enabled: true
  num_cpus: 64
  num_gpus: 1
  gpu_actor_fraction: 0.5   # pack 2 small-model actors per 143GB GPU (s2 motion/DOVER, s6 verify)
  parallel_clip_min: 2
  chunk_size: 32
  parallel_clip_export: true
  parallel_motion: true
  motion_workers: 4
  parallel_dover: true
  dover_workers: 4
  parallel_gpu_classify: false
  parallel_gpu_caption: false   # s8 now runs on vLLM, not Ray/HF replicas
  parallel_gpu_verify: true
  verify_workers: 4
  parallel_actor_tag: true
  actor_tag_workers: 2
  parallel_clip_score: true
  clip_score_workers: 2
  parallel_motion_gpu: true
  parallel_dover_gpu: true
  parallel_frame_extract: true
  frame_extract_workers: 32

models_overrides:
  vllm:
    batch_size: 4            # sweep: batch size has no effect on actor mis-tagging
    max_tokens: 500
    max_model_len: 8192
    num_frames: 16             # sweep: 16 frames ~halves mis-tags vs 32 AND is faster
    max_videos_per_prompt: 1
    tensor_parallel_size: 1     # data-parallel: one Gemma4-dense replica per GPU
    gpu_ids: [0]
  unimatch:
    device: cuda:0
  dover:
    device: cuda:0
  clip_model:
    use_placeholder: false
    gpu_ids: [0]
  gemma:
    model_path: /mnt/data0/harsha/new_dataset_pipeline/models/gemma-3-4b-it
    gpu_ids: [0]
    max_new_tokens: 128
  vcinspector:
    model_path: /mnt/data0/harsha/new_dataset_pipeline/models/VCInspector-7B

captioner:
  caption_model: gemma4_dense
  backend: vllm_video         # native MP4 clips fed to vLLM video modality
  gpu_ids: [0]
  tensor_parallel_size: 1
  batch_size: 4            # sweep: no quality penalty, max throughput
  max_tokens: 500
  num_frames: 16           # sweep: best quality + fastest (vs 32)
  caption_all_clips: true
  caption_format: prose
  prompt_version: gemma4_dense_vllm_v1
  recaption_overtag: true      # re-roll clips that over-tag a 2nd person (same actor name)
  recaption_candidates: 6
  recaption_temperature: 0.5

s13:
  enabled: true
  conda_env: vcinspector
  worker: scripts/vcinspector_worker.py
  model_id: dipta007/VCInspector-7B
  gpu_ids: [0]
  batch_size: 16          # clips per vLLM chunk (batched video inference)
  video_max_pixels: 50176 # 224x224 — frames downscaled before vLLM (README default)
  fps: 1.0
  fps_max_frames: 12      # sampled frames per clip (vLLM video)
  max_tokens: 256
  include_verdicts:
    - FINAL
    - REVIEW

services_order:
  - s1
  - s2
  - s3
  - s4
  - s5
  - s6
  - s7
  - s8
  - s9
  - s10
  - s13
  - s11
  - s12

movie_registry: data/movie_registry.csv

master_pipeline:
  root: master
  classify_model_path: /mnt/data0/harsha/new_dataset_pipeline/models/Qwen2.5-VL-7B-Instruct
  model_path: /mnt/data0/harsha/new_dataset_pipeline/models/Qwen2.5-VL-7B-Instruct
  gemma_model_path: /mnt/data0/harsha/new_dataset_pipeline/models/gemma-3-4b-it
  actor_embeddings_dir: actors/actor_embeddings
  yolo_face_model: yolov12n-face.pt
  actor_similarity_threshold: 0.35
  actor_similarity_margin: 0.10
  actor_caption_min_similarity: 0.35
  actor_caption_min_margin: 0.10
  classify_gpu_ids: [0]
  verify_gpu_ids: [0]
  actor_tag_gpu_id: 0
  clip_gpu_ids: [0]
  caption_backend: vllm_video
  prompts_dir: prompts
  max_new_tokens: 128
  auto_download_yolo: true
