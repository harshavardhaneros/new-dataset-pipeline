pipeline_root: /mnt/data0/harsha/new_dataset_pipeline/Indic_video_pipeline
outputs_root: /mnt/data0/harsha/new_dataset_pipeline/pipeline_outputs
models_root: /mnt/data0/harsha/new_dataset_pipeline/models

isolate_run_outputs: false
runs_dir: runs

workspaces_dir: workspaces
logs_dir: logs
reports_dir: reports

prompt_pack:
  zip_path: /mnt/data0/harsha/new_dataset_pipeline/zip_12buckets.zip

export:
  include_verdicts:
    - FINAL
    - REVIEW

services_order:
  - s1
  - s2
  - s3
  - s4
  - s5
  - s6
  - s7
  - s8
  - s9
  - s10
  - s11
  - s12

movie_registry: data/movie_registry.csv

# VLM weights on disk: Qwen2.5-VL-32B-Instruct (architecture label: Qwen3-VL-32B)
master_pipeline:
  root: master
  vlm_model_name: Qwen3-VL-32B
  model_path: /mnt/data0/harsha/new_dataset_pipeline/models/Qwen2.5-VL-32B-Instruct
  gemma_model_path: /mnt/data0/harsha/new_dataset_pipeline/models/gemma-3-27b-it
  actor_embeddings_dir: actors/actor_embeddings
  yolo_face_model: yolov12n-face.pt
  prompts_dir: prompts
  actor_similarity_threshold: 0.35
  # GPU assignment per stage (printed in terminal at each service)
  classify_gpu_ids: [0, 1, 2, 3]
  verify_gpu_ids: [5, 6]
  caption_gpu_ids: [0, 1, 2, 3]
  actor_tag_gpu_id: 4
  clip_gpu_ids: [5]
  caption_backend: transformers
  max_new_tokens: 512
  auto_download_yolo: true
