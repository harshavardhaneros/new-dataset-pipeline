# v3 single-GPU preset (Gemma caption on GPU 0)
pipeline_root: /mnt/data0/harsha/new_dataset_pipeline/Indic_video_pipeline
outputs_root: /mnt/data0/harsha/new_dataset_pipeline/v3_outputs
models_root: /mnt/data0/harsha/new_dataset_pipeline/models

output_layout: per_movie
isolate_run_outputs: true

workspaces_dir: workspaces
logs_dir: logs
reports_dir: reports

prompt_pack:
  zip_path: /mnt/data0/harsha/new_dataset_pipeline/zip_12buckets.zip

export:
  include_verdicts:
    - FINAL
    - REVIEW
  export_clips: true
  remove_watermark: true

s2:
  mode: score_only

# Ray: CPU-parallel ffmpeg; GPU motion/DOVER capped at 1 worker on single GPU.
ray:
  enabled: true
  num_cpus: 8
  parallel_clip_min: 4
  chunk_size: 32
  parallel_frame_extract: true
  parallel_clip_export: true
  parallel_motion: true
  motion_workers: 1
  parallel_dover: true
  dover_workers: 1

models_overrides:
  unimatch:
    device: cuda:0
  dover:
    device: cuda:0

captioner:
  # qwen_video = native MP4 in (fastest quality/speed with 7B). gemma = 3-frame images.
  backend: qwen_video
  model_path: /mnt/data0/harsha/new_dataset_pipeline/models/Qwen2.5-VL-7B-Instruct
  gpu_ids: [0]
  batch_size: 1
  max_tokens: 800
  video_fps: 1.0
  max_pixels: 151200
  multi_frame: true
  caption_all_clips: true
  caption_format: prose
  prompt_version: qwen_video_eros_v1

models_overrides:
  gemma:
    gpu_ids: [0]
  gemma_caption:
    gpu_ids: [0]
    batch_size: 8
  qwen_video_caption:
    gpu_ids: [0]

services_order:
  - s1
  - s2
  - s3
  - s4
  - s5
  - s6
  - s7
  - s8
  - s9
  - s10
  - s11
  - s12

movie_registry: data/movie_registry.csv

master_pipeline:
  root: master
  vlm_model_name: Qwen3-VL-32B
  model_path: /mnt/data0/harsha/new_dataset_pipeline/models/Qwen2.5-VL-32B-Instruct
  gemma_model_path: /mnt/data0/harsha/new_dataset_pipeline/models/gemma-3-27b-it
  actor_embeddings_dir: actors/actor_embeddings
  yolo_face_model: yolov12n-face.pt
  prompts_dir: prompts
  actor_similarity_threshold: 0.35
  classify_gpu_ids: [0]
  verify_gpu_ids: [0]
  actor_tag_gpu_id: 0
  clip_gpu_ids: [0]
  caption_backend: transformers
  max_new_tokens: 512
  auto_download_yolo: true
