# Architecture model map (see terminal GPU banners per service)

classifier: Qwen3-VL-32B
verifier: Gemma-3-4B-IT
# Caption models (set captioner.caption_model + backend in pipeline yaml):
#   qwen2.5      -> Qwen2.5-VL-7B-Instruct  (vllm frames | video MP4)
#   qwen3        -> Qwen3-VL-32B-Instruct    (vllm frames)
#   qwen3.5      -> Qwen3.5-27B              (video MP4 native)
#   gemma3       -> gemma-3-4b-it            (gemma frames)
#   gemma4       -> gemma-4-31b-it           (vllm frames)
#   gemma4_dense -> gemma-4-31b-dense        (video MP4 native, same weights as gemma4)
# Download: bash scripts/download_caption_models.sh qwen3.5 gemma4_dense

captioner: Gemma-3-4B-IT
face: YOLOv12n-face + InsightFace-buffalo_l
scoring: CLIP + GroundingDINO + spaCy

qwen:
  use_placeholder: false

master_caption:
  enabled: true
  use_placeholder: false

gemma:
  model_name: Gemma-3-4B-IT
  model_path: /mnt/data0/harsha/new_dataset_pipeline/models/gemma-3-4b-it
  gpu_ids: [1]
  max_new_tokens: 128
  use_placeholder: false

gemma_caption:
  model_name: Gemma-3-4B-IT
  model_path: /mnt/data0/harsha/new_dataset_pipeline/models/gemma-3-4b-it
  gpu_ids: [0]
  batch_size: 8
  max_tokens: 1000
  use_placeholder: false

gemma4_caption:
  model_name: Gemma-4-31B-IT
  model_path: /mnt/data0/harsha/new_dataset_pipeline/models/gemma-4-31b-it
  gpu_ids: [0, 1, 2, 3]
  batch_size: 1
  max_tokens: 1000
  use_placeholder: false

# Native MP4 video input (Qwen2.5-VL). Fast default: 7B; falls back to 32B if 7B missing.
qwen_video_caption:
  model_name: Qwen2.5-VL-7B-Instruct
  model_path: /mnt/data0/harsha/new_dataset_pipeline/models/Qwen2.5-VL-7B-Instruct
  gpu_ids: [0]
  batch_size: 1
  max_tokens: 1000
  video_fps: 1.5
  max_pixels: 201600
  use_placeholder: false

qwen3_video_caption:
  model_name: Qwen3-VL-32B-Instruct
  model_path: /mnt/data0/harsha/new_dataset_pipeline/models/Qwen3-VL-32B-Instruct
  gpu_ids: [0, 1, 2, 3]
  batch_size: 1
  max_tokens: 1000
  use_placeholder: false

clip_model:
  name: ViT-B-32
  pretrained: openai
  use_placeholder: false

lama:
  use_placeholder: true

unimatch:
  repo_path: /mnt/data0/harsha/new_dataset_pipeline/models/unimatch
  checkpoint: /mnt/data0/harsha/new_dataset_pipeline/models/unimatch/gmflow-scale2-regrefine6-mixdata.pth
  sample_interval_sec: 0.5
  resize_width: 576
  resize_height: 320
  fallback_scale: 8.0

vmaf:
  sample_interval_sec: 0.5
  binary: vmaf

dover:
  use_placeholder: true
  repo_path: /mnt/data0/harsha/new_dataset_pipeline/models/DOVER
  checkpoint: /mnt/data0/harsha/new_dataset_pipeline/models/DOVER/pretrained_weights/DOVER.pth
  config_path: /mnt/data0/harsha/new_dataset_pipeline/models/DOVER/dover.yml
  device: cuda
